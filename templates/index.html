<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIGUARD-ML Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 6px;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: #555;
        }

        button {
            margin-top: 12px;
            width: 100%;
            padding: 12px;
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .allowed {
            background: #e6f4ea;
            border: 1px solid #a8d5b5;
            color: #2d6a3f;
        }

        .blocked {
            background: #fdecea;
            border: 1px solid #f5b7b1;
            color: #922b21;
        }

        .status {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .confidence {
            font-size: 12px;
            color: inherit;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>PIGUARD-ML</h1>
        <p class="subtitle">Prompt injection detection for educational chatbots</p>
        <textarea id="input" placeholder="Enter a student message..."></textarea>
        <button onclick="checkInput()">Check Input</button>
        <div class="result" id="result">
            <div class="status" id="status"></div>
            <div id="message"></div>
            <div class="confidence" id="confidence"></div>
        </div>
    </div>

    <script>
        async function checkInput() {
            const text = document.getElementById('input').value.trim();
            if (!text) return;

            const res = await fetch('/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });

            const data = await res.json();
            const resultDiv = document.getElementById('result');
            const status = document.getElementById('status');
            const message = document.getElementById('message');
            const confidence = document.getElementById('confidence');

            resultDiv.style.display = 'block';
            resultDiv.className = 'result ' + (data.allowed ? 'allowed' : 'blocked');
            status.textContent = data.allowed ? '✓ ALLOWED' : '✗ BLOCKED';
            message.textContent = data.message;
            confidence.textContent = `Confidence: ${(data.confidence * 100).toFixed(2)}%`;
        }
    </script>
</body>

</html>
